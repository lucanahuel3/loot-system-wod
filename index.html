<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrilloLootSystem</title>
<style>
:root{--bg:#1C1C1C;--panel:#262626;--panel2:#2E2E2E;--text:#EDEDED}
body{margin:0;font-family:Arial;background:var(--bg);color:var(--text)}
.container{display:grid;grid-template-columns:320px 1fr 320px;gap:18px;padding:18px}
.card{background:var(--panel);border-radius:16px;padding:14px}
.calendar{background:white;color:black;border-radius:16px;padding:12px}
.days,.dates{display:grid;grid-template-columns:repeat(7,1fr);text-align:center}
.selected{background:black;color:white}
textarea{width:100%;height:150px;border-radius:12px;border:none;padding:12px;background:#1a1a1a;color:#eee}
button{padding:10px;border:none;border-radius:12px;background:#3a3a3a;color:white;margin-top:5px}
.panel{background:var(--panel2);border-radius:14px;padding:10px}
.list{max-height:360px;overflow:auto}
.row{display:flex;justify-content:space-between;padding:6px}
</style>
</head>
<body>
<div class="container">

<div>
  <div class="calendar" id="calendar"></div>
  <div class="card"><ul id="history"></ul></div>
  <div class="card"><div id="sessionsList"></div></div>
</div>

<div>
  <div class="card">
    <div><strong>Total del mes:</strong> <span id="monthGold">0</span> 🪙 • <span id="monthSilver">0</span> 🥈 • <span id="monthCopper">0</span> 🥉</div>
    <br>
    Earned Money: <span id="gold">0</span> 🪙 • <span id="silver">0</span> 🥈 • <span id="copper">0</span> 🥉
    <div>Time in fights: <span id="time">1 h. 0 min. 0 sec.</span></div>
    <textarea id="log"></textarea>
    <button onclick="analyze()">Analizar</button>
    <button onclick="undoLast()">Deshacer</button>
    <button onclick="deleteDay()" style="background:#7a2a2a">Borrar sesiones del día</button>
  </div>
  <div class="card">
    <input id="searchDrops" placeholder="Buscar item..." style="width:100%;padding:8px;border-radius:10px;border:none;margin-bottom:8px;background:#1a1a1a;color:#eee" oninput="filterDrops(this.value)">
    <div id="drops" class="panel list"></div>
  </div>
</div>

<div>
  <div class="card">Fights: <span id="fightCount">0</span><div id="fights" class="panel list"></div></div>
</div>

</div>

<script>
let current=new Date();
let selectedDate=formatKey(new Date());
let sessions=JSON.parse(localStorage.getItem("grilloSessions")||"{}");

function ensureArraySession(key){
  if(!sessions[key]) sessions[key]=[];
  if(!Array.isArray(sessions[key])) sessions[key]=[sessions[key]];
}

function save(){localStorage.setItem("grilloSessions",JSON.stringify(sessions));}
function formatKey(d){return d.toISOString().slice(0,10);}

// CALENDAR
function generateCalendar(){
  let cal=document.getElementById("calendar");
  let y=current.getFullYear(),m=current.getMonth();
  cal.innerHTML="";

  let head=document.createElement("div");
  let prev=document.createElement("button");prev.innerText="←";
  prev.onclick=()=>{current.setMonth(m-1);generateCalendar();renderMonthTotal();};
  let next=document.createElement("button");next.innerText="→";
  next.onclick=()=>{current.setMonth(m+1);generateCalendar();renderMonthTotal();};
  head.append(prev,document.createTextNode(` ${m+1}/${y} `),next);
  cal.appendChild(head);

  let daysRow=document.createElement("div");daysRow.className="days";
  ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"].forEach(d=>{
    let el=document.createElement("div");el.innerText=d;daysRow.appendChild(el);
  });
  cal.appendChild(daysRow);

  let first=new Date(y,m,1).getDay();
  let total=new Date(y,m+1,0).getDate();
  let dates=document.createElement("div");dates.className="dates";

  for(let i=0;i<first;i++)dates.appendChild(document.createElement("div"));

  for(let d=1;d<=total;d++){
    let el=document.createElement("div");el.innerText=d;
    let key=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if(key===selectedDate)el.classList.add("selected");
    el.onclick=()=>{selectedDate=key;renderDay(key);generateCalendar();};
    dates.appendChild(el);
  }
  cal.appendChild(dates);
}

// ANALYZE
function analyze(){
  let lines=document.getElementById("log").value.split("\n");
  let mobs={},drops={},g=0,s=0,c=0;

  lines.forEach(line=>{
    if(!line) return;

    // FIGHTS (robusto)
    let fm = line.match(/You have attacked\s+(.+?)(?:\s*\[\d+\]|\s+\d+)\s*\./i);
    if(fm){
      let mob=fm[1].trim();
      mobs[mob]=(mobs[mob]||0)+1;
    }

    // DROPS
    let dm=line.match(/Received:\s*(.+?)\s*(\d+)\s*pcs\./i);
    if(dm) drops[dm[1]]=(drops[dm[1]]||0)+(+dm[2]);

    // MONEY
    let rec=line.match(/You have received\s+([\d\s]+)/i);
    if(rec){
      let nums=rec[1].trim().split(/\s+/).map(Number);
      if(nums.length===3){g+=nums[0];s+=nums[1];c+=nums[2];}
      else if(nums.length===2){s+=nums[0];c+=nums[1];}
    }

    let rich=line.match(/richer by\s+([\d\s]+)/i);
    if(rich){
      let nums=rich[1].trim().split(/\s+/).map(Number);
      if(nums.length===2){s+=nums[0];c+=nums[1];}
    }
  });

  let total=c+s*100+g*10000;
  g=Math.floor(total/10000);total%=10000;
  s=Math.floor(total/100);c=total%100;

  ensureArraySession(selectedDate);
  sessions[selectedDate].push({g,s,c,fights:Object.entries(mobs),drops:Object.entries(drops)});

  save();renderDay(selectedDate);loadHistory();
}

// RENDER
function renderDay(key){
  renderMonthTotal();
  ensureArraySession(key);
  let day=sessions[key];

  let g=0,s=0,c=0,m={},d={};

  day.forEach(x=>{
    g+=x.g||0; s+=x.s||0; c+=x.c||0;

    (x.fights||[]).forEach(f=>{
      m[f[0]]=(m[f[0]]||0)+(f[1]||0);
    });

    (x.drops||[]).forEach(dr=>{
      d[dr[0]]=(d[dr[0]]||0)+(dr[1]||0);
    });
  });

  let total=c+s*100+g*10000;
  g=Math.floor(total/10000);total%=10000;
  s=Math.floor(total/100);c=total%100;

  document.getElementById("gold").innerText=g;
  document.getElementById("silver").innerText=s;
  document.getElementById("copper").innerText=c;

  let fightsHTML="",count=0;
  Object.entries(m).forEach(([k,v])=>{count+=v;fightsHTML+=`<div class='row'>${k} ×${v}</div>`});
  document.getElementById("fightCount").innerText=count;
  document.getElementById("fights").innerHTML=fightsHTML;

  let dropsArray = Object.entries(d);
  window._currentDrops = dropsArray;
  document.getElementById("drops").innerHTML=
    dropsArray.map(([k,v])=>`<div class='row'>${k} ×${v}</div>`).join("");

  let sessionsHTML = day.map((sesh, i)=>{
    return `<div class='row'>Sesión ${i+1} <button onclick='deleteSession(${i})' style='background:#7a2a2a'>X</button></div>`;
  }).join("");

  document.getElementById("sessionsList").innerHTML = sessionsHTML;
}

function deleteSession(index){
  ensureArraySession(selectedDate);
  sessions[selectedDate].splice(index,1);
  if(sessions[selectedDate].length===0) delete sessions[selectedDate];
  save();renderDay(selectedDate);loadHistory();
}

function loadHistory(){
  let ul=document.getElementById("history");ul.innerHTML="";
  Object.keys(sessions).forEach(d=>{
    let li=document.createElement("li");
    li.innerText=d+" ("+sessions[d].length+")";
    li.onclick=()=>{selectedDate=d;renderDay(d);generateCalendar();};
    ul.appendChild(li);
  });
}

function undoLast(){
  ensureArraySession(selectedDate);
  sessions[selectedDate].pop();
  if(sessions[selectedDate].length===0) delete sessions[selectedDate];
  save();renderDay(selectedDate);loadHistory();
}

function deleteDay(){
  if(!sessions[selectedDate]) return;
  if(confirm("¿Seguro que querés borrar TODAS las sesiones de este día?")){
    delete sessions[selectedDate];
    save();
    renderDay(selectedDate);
    loadHistory();
  }
}

function filterDrops(query){
  if(!window._currentDrops) return;
  let filtered = window._currentDrops.filter(([name])=>
    name.toLowerCase().includes(query.toLowerCase())
  );
  document.getElementById("drops").innerHTML=
    filtered.map(([k,v])=>`<div class='row'>${k} ×${v}</div>`).join("");
}

function renderMonthTotal(){
  let y=current.getFullYear();
  let m=current.getMonth()+1;

  let g=0,s=0,c=0;

  Object.keys(sessions).forEach(date=>{
    let [year,month]=date.split("-");
    if(+year===y && +month===m){
      sessions[date].forEach(x=>{
        g+=x.g||0;
        s+=x.s||0;
        c+=x.c||0;
      });
    }
  });

  let total=c+s*100+g*10000;
  g=Math.floor(total/10000);total%=10000;
  s=Math.floor(total/100);c=total%100;

  document.getElementById("monthGold").innerText=g;
  document.getElementById("monthSilver").innerText=s;
  document.getElementById("monthCopper").innerText=c;
}

// TESTS
function runTests(){
  console.assert(typeof sessions === 'object','sessions debe ser objeto');
  Object.values(sessions).forEach(v=>{
    console.assert(Array.isArray(v),'cada fecha debe tener array');
  });

  let test="You have attacked Nepherto [15] .";
  let match=test.match(/You have attacked\s+(.+?)(?:\s*\[\d+\]|\s+\d+)\s*\./i);
  console.assert(match && match[1]==="Nepherto","regex fights OK");
}
runTests();

// INIT
generateCalendar();
loadHistory();
renderDay(selectedDate);
</script>
</body>
</html>
